services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    restart: unless-stopped

    volumes:
      - .:/var/www

    networks:
      - laravel

  nginx:
    image: nginx:latest

    container_name: laravel_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - laravel

networks:
  laravel:
